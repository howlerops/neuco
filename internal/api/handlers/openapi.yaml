openapi: 3.1.0
info:
  title: Neuco API
  description: |
    AI-native product intelligence platform API.
    Signal ingestion → AI synthesis → spec generation → code generation → GitHub PR.
  version: 1.0.0
  contact:
    name: Neuco
    url: https://neuco.ai

servers:
  - url: /api/v1
    description: API v1

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication (GitHub OAuth, Google SSO, token refresh)
  - name: Organizations
    description: Organization management
  - name: Members
    description: Organization member management
  - name: Projects
    description: Project CRUD
  - name: Signals
    description: Signal ingestion and querying
  - name: Candidates
    description: Feature candidate management
  - name: Specs
    description: Product spec generation and editing
  - name: Generations
    description: Code generation and PR creation
  - name: Pipelines
    description: Pipeline run tracking
  - name: Copilot
    description: AI copilot notes and insights
  - name: Integrations
    description: Third-party integrations (Nango, Intercom, Slack)
  - name: Billing
    description: Subscription and usage billing
  - name: LLM Usage
    description: LLM cost and usage tracking
  - name: Onboarding
    description: User onboarding flow
  - name: Webhooks
    description: Incoming webhook endpoints
  - name: Operator
    description: Internal operator endpoints (requires API token)

paths:
  # ──── Auth ────────────────────────────────────────────────────────────────
  /auth/github/callback:
    post:
      tags: [Auth]
      summary: Exchange GitHub OAuth code for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "201":
          description: Tokens issued
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"

  /auth/google/callback:
    post:
      tags: [Auth]
      summary: Exchange Google OAuth code for tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                redirect_uri:
                  type: string
      responses:
        "201":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using httpOnly cookie
      security: []
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Clear refresh token cookie
      security: []
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user and their organizations
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  orgs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/github/repos:
    get:
      tags: [Auth]
      summary: List GitHub repos accessible to the authenticated user
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    full_name:
                      type: string
                    default_branch:
                      type: string

  /auth/nango/connect-session:
    post:
      tags: [Auth]
      summary: Create a Nango Connect session for the frontend SDK
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  # ──── Onboarding ──────────────────────────────────────────────────────────
  /onboarding/status:
    get:
      tags: [Onboarding]
      summary: Get onboarding progress
      responses:
        "200":
          description: Onboarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"

  /onboarding/step:
    post:
      tags: [Onboarding]
      summary: Mark an onboarding step as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step]
              properties:
                step:
                  $ref: "#/components/schemas/OnboardingStep"
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"

  /onboarding/skip:
    post:
      tags: [Onboarding]
      summary: Skip remaining onboarding
      responses:
        "200":
          description: Onboarding marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStatus"

  # ──── Organizations ───────────────────────────────────────────────────────
  /orgs:
    get:
      tags: [Organizations]
      summary: List organizations the current user belongs to
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      tags: [Organizations]
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /orgs/{orgId}:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Organizations]
      summary: Get organization details
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    patch:
      tags: [Organizations]
      summary: Update organization (admin+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  # ──── Members ─────────────────────────────────────────────────────────────
  /orgs/{orgId}/members:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Members]
      summary: List organization members
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgMember"

  /orgs/{orgId}/members/invite:
    parameters:
      - $ref: "#/components/parameters/orgId"
    post:
      tags: [Members]
      summary: Invite a user to the organization (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                role:
                  $ref: "#/components/schemas/OrgRole"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"

  /orgs/{orgId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/orgId"
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Members]
      summary: Update member role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/OrgRole"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMember"
    delete:
      tags: [Members]
      summary: Remove member from organization (admin+)
      responses:
        "204":
          description: Member removed

  # ──── Org Projects ────────────────────────────────────────────────────────
  /orgs/{orgId}/projects:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Projects]
      summary: List projects in the organization
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Projects]
      summary: Create a project (member+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, github_repo, framework, styling]
              properties:
                name:
                  type: string
                github_repo:
                  type: string
                framework:
                  $ref: "#/components/schemas/ProjectFramework"
                styling:
                  $ref: "#/components/schemas/ProjectStyling"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ──── GitHub App ──────────────────────────────────────────────────────────
  /orgs/{orgId}/github/installations:
    parameters:
      - $ref: "#/components/parameters/orgId"
    post:
      tags: [Integrations]
      summary: Register GitHub App installation (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [installation_id]
              properties:
                installation_id:
                  type: integer
      responses:
        "200":
          description: Installation registered

  /orgs/{orgId}/github/repos:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Integrations]
      summary: List repos from GitHub App installation
      responses:
        "200":
          description: Repository list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # ──── Billing ─────────────────────────────────────────────────────────────
  /orgs/{orgId}/billing/subscription:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Billing]
      summary: Get current subscription
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /orgs/{orgId}/billing/usage:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Billing]
      summary: Get usage summary for current billing period
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageSummary"

  /orgs/{orgId}/billing/checkout:
    parameters:
      - $ref: "#/components/parameters/orgId"
    post:
      tags: [Billing]
      summary: Create Stripe checkout session (admin+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                price_id:
                  type: string
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /orgs/{orgId}/billing/portal:
    parameters:
      - $ref: "#/components/parameters/orgId"
    post:
      tags: [Billing]
      summary: Create Stripe billing portal session (admin+)
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /orgs/{orgId}/llm-usage:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [LLM Usage]
      summary: Get aggregated LLM usage for the organization
      responses:
        "200":
          description: LLM usage aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMUsageAgg"

  /orgs/{orgId}/audit-log:
    parameters:
      - $ref: "#/components/parameters/orgId"
    get:
      tags: [Organizations]
      summary: Get organization audit log
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"
                  total:
                    type: integer

  # ──── Projects (scoped) ───────────────────────────────────────────────────
  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Projects]
      summary: Get project details
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      tags: [Projects]
      summary: Update project (admin+)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                github_repo:
                  type: string
                framework:
                  $ref: "#/components/schemas/ProjectFramework"
                styling:
                  $ref: "#/components/schemas/ProjectStyling"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      tags: [Projects]
      summary: Delete project (admin+)
      responses:
        "204":
          description: Project deleted

  /projects/{projectId}/stats:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Projects]
      summary: Get project statistics
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  signal_count:
                    type: integer
                  candidate_count:
                    type: integer
                  spec_count:
                    type: integer
                  generation_count:
                    type: integer
                  pipeline_count:
                    type: integer

  # ──── Signals ─────────────────────────────────────────────────────────────
  /projects/{projectId}/signals:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Signals]
      summary: List signals with filtering and pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/SignalSource"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/SignalType"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Signal list
          content:
            application/json:
              schema:
                type: object
                properties:
                  signals:
                    type: array
                    items:
                      $ref: "#/components/schemas/Signal"
                  total:
                    type: integer

  /projects/{projectId}/signals/upload:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Signals]
      summary: Upload signals from CSV or text file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Signals ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  inserted:
                    type: integer
                  pipeline_run_id:
                    type: string
                    format: uuid

  /projects/{projectId}/signals/query:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Signals]
      summary: Semantic search over signals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                filters:
                  type: object
                  properties:
                    sources:
                      type: array
                      items:
                        type: string
                    types:
                      type: array
                      items:
                        type: string
                    from:
                      type: string
                      format: date-time
                    to:
                      type: string
                      format: date-time
                    limit:
                      type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  question:
                    type: string
                  results:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Signal"
                        - type: object
                          properties:
                            distance_score:
                              type: number
                  total:
                    type: integer

  /projects/{projectId}/signals/{signalId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: signalId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Signals]
      summary: Delete a signal
      responses:
        "204":
          description: Signal deleted

  # ──── Candidates ──────────────────────────────────────────────────────────
  /projects/{projectId}/candidates:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Candidates]
      summary: List feature candidates
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Candidate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeatureCandidate"
                  total:
                    type: integer

  /projects/{projectId}/candidates/refresh:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Candidates]
      summary: Trigger synthesis to refresh candidates
      responses:
        "201":
          description: Synthesis pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_run_id:
                    type: string
                    format: uuid

  /projects/{projectId}/candidates/{cId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/candidateId"
    patch:
      tags: [Candidates]
      summary: Update candidate status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/CandidateStatus"
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureCandidate"

  # ──── Specs ───────────────────────────────────────────────────────────────
  /projects/{projectId}/candidates/{cId}/spec:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/candidateId"
    get:
      tags: [Specs]
      summary: Get the spec for a candidate
      responses:
        "200":
          description: Spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Specs]
      summary: Update spec fields (auto-bumps version)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                problem_statement:
                  type: string
                proposed_solution:
                  type: string
                user_stories:
                  type: array
                  items:
                    $ref: "#/components/schemas/UserStory"
                acceptance_criteria:
                  type: array
                  items:
                    type: string
                out_of_scope:
                  type: array
                  items:
                    type: string
                ui_changes:
                  type: string
                data_model_changes:
                  type: string
                open_questions:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated spec
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spec"

  /projects/{projectId}/candidates/{cId}/spec/generate:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/candidateId"
    post:
      tags: [Specs]
      summary: Generate a spec using AI
      responses:
        "201":
          description: Spec generation pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_run_id:
                    type: string
                    format: uuid

  # ──── Code Generation ─────────────────────────────────────────────────────
  /projects/{projectId}/candidates/{cId}/generate:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/candidateId"
    post:
      tags: [Generations]
      summary: Enqueue code generation for a candidate
      responses:
        "201":
          description: Codegen pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  generation_id:
                    type: string
                    format: uuid
                  pipeline_run_id:
                    type: string
                    format: uuid
        "409":
          description: Spec not generated yet
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/generations:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Generations]
      summary: List code generations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Generation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  generations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Generation"
                  total:
                    type: integer

  /projects/{projectId}/generations/{gId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: gId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Generations]
      summary: Get generation details
      responses:
        "200":
          description: Generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Generation"

  /projects/{projectId}/generations/{gId}/stream:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: gId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Generations]
      summary: Stream generation progress (SSE)
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

  # ──── Pipelines ───────────────────────────────────────────────────────────
  /projects/{projectId}/pipelines:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Pipelines]
      summary: List pipeline runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Pipeline run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineRun"
                  total:
                    type: integer

  /projects/{projectId}/pipelines/{runId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Pipelines]
      summary: Get pipeline run with tasks
      responses:
        "200":
          description: Pipeline run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRun"

  /projects/{projectId}/pipelines/{runId}/retry:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Pipelines]
      summary: Retry a failed pipeline
      responses:
        "200":
          description: Retry enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: retry_enqueued
                  run_id:
                    type: string
                    format: uuid

  /projects/{projectId}/pipelines/{runId}/llm-usage:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [LLM Usage]
      summary: Get LLM usage for a specific pipeline run
      responses:
        "200":
          description: LLM usage for pipeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMUsageAgg"

  # ──── LLM Usage ───────────────────────────────────────────────────────────
  /projects/{projectId}/llm-usage:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [LLM Usage]
      summary: Get aggregated LLM usage for the project
      responses:
        "200":
          description: LLM usage aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LLMUsageAgg"

  /projects/{projectId}/llm-usage/calls:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [LLM Usage]
      summary: List individual LLM calls
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: LLM call list
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/LLMCall"
                  total:
                    type: integer

  # ──── Copilot Notes ───────────────────────────────────────────────────────
  /projects/{projectId}/copilot/notes:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Copilot]
      summary: List copilot notes
      parameters:
        - name: target_type
          in: query
          schema:
            $ref: "#/components/schemas/CopilotNoteTargetType"
        - name: target_id
          in: query
          schema:
            type: string
            format: uuid
        - name: include_dismissed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Copilot notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CopilotNote"

  /projects/{projectId}/copilot/notes/{noteId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: noteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Copilot]
      summary: Dismiss a copilot note
      responses:
        "200":
          description: Note dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: dismissed

  # ──── Integrations ────────────────────────────────────────────────────────
  /projects/{projectId}/integrations:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Integrations]
      summary: List integrations
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"
    post:
      tags: [Integrations]
      summary: Create a webhook integration (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                config:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Integration created (webhook_secret visible once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

  /projects/{projectId}/integrations/{integrationId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/integrationId"
    get:
      tags: [Integrations]
      summary: Get integration details
      responses:
        "200":
          description: Integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
    delete:
      tags: [Integrations]
      summary: Delete integration (admin+)
      responses:
        "204":
          description: Integration deleted

  # ──── Intercom ────────────────────────────────────────────────────────────
  /projects/{projectId}/intercom/authorize:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Integrations]
      summary: Get Intercom OAuth authorize URL
      responses:
        "200":
          description: Authorize URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /projects/{projectId}/intercom/callback:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Integrations]
      summary: Complete Intercom OAuth callback (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "201":
          description: Intercom connected

  /projects/{projectId}/intercom/{integrationId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/integrationId"
    delete:
      tags: [Integrations]
      summary: Disconnect Intercom (admin+)
      responses:
        "204":
          description: Disconnected

  /projects/{projectId}/intercom/{integrationId}/sync:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/integrationId"
    post:
      tags: [Integrations]
      summary: Trigger Intercom sync
      responses:
        "201":
          description: Sync started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_run_id:
                    type: string
                    format: uuid

  # ──── Slack ───────────────────────────────────────────────────────────────
  /projects/{projectId}/slack/authorize:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Integrations]
      summary: Get Slack OAuth authorize URL
      responses:
        "200":
          description: Authorize URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /projects/{projectId}/slack/callback:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Integrations]
      summary: Complete Slack OAuth callback (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "201":
          description: Slack connected

  /projects/{projectId}/slack/{integrationId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/integrationId"
    delete:
      tags: [Integrations]
      summary: Disconnect Slack (admin+)
      responses:
        "204":
          description: Disconnected

  /projects/{projectId}/slack/{integrationId}/sync:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/integrationId"
    post:
      tags: [Integrations]
      summary: Trigger Slack sync
      responses:
        "201":
          description: Sync started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipeline_run_id:
                    type: string
                    format: uuid

  # ──── Nango ───────────────────────────────────────────────────────────────
  /projects/{projectId}/nango/connections:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Integrations]
      summary: List Nango connections
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Integrations]
      summary: Register a Nango connection (admin+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [connection_id, provider_config_key]
              properties:
                connection_id:
                  type: string
                provider_config_key:
                  type: string
      responses:
        "201":
          description: Connection registered

  /projects/{projectId}/nango/connections/{connectionId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [Integrations]
      summary: Delete a Nango connection (admin+)
      responses:
        "204":
          description: Connection deleted

  /projects/{projectId}/nango/sync/{connectionId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Integrations]
      summary: Trigger Nango sync
      responses:
        "201":
          description: Sync started

  # ──── Agent Config ────────────────────────────────────────────────────────
  /projects/{projectId}/agent-config:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Generations]
      summary: Get effective agent config for project
      responses:
        "200":
          description: Agent config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Generations]
      summary: Create or update agent config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAgentConfigRequest"
      responses:
        "200":
          description: Updated agent config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfig"
    delete:
      tags: [Generations]
      summary: Delete agent config
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Agent config deleted

  /projects/{projectId}/agent-config/validate:
    parameters:
      - $ref: "#/components/parameters/projectId"
    post:
      tags: [Generations]
      summary: Validate agent config without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateAgentConfigRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateAgentConfigResponse"

  /agent-providers:
    get:
      tags: [Generations]
      summary: List available agent providers
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentProviderInfo"

  # ──── Sandbox Sessions ────────────────────────────────────────────────────
  /projects/{projectId}/sessions:
    parameters:
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Generations]
      summary: List sandbox sessions for project
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SandboxSession"
                  total:
                    type: integer

  /projects/{projectId}/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Generations]
      summary: Get sandbox session detail
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxSession"
    delete:
      tags: [Generations]
      summary: Stop/cancel a sandbox session
      responses:
        "204":
          description: Session cancelled

  /projects/{projectId}/sessions/{sessionId}/stream:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Generations]
      summary: Stream sandbox session events (SSE)
      responses:
        "200":
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string

  # ──── Webhooks ────────────────────────────────────────────────────────────
  /webhooks/{projectId}/{secret}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - name: secret
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Webhooks]
      summary: Receive webhook payload
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook accepted

  /webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook handler
      security: []
      responses:
        "200":
          description: Webhook processed

  /webhooks/intercom:
    post:
      tags: [Webhooks]
      summary: Intercom webhook handler
      security: []
      responses:
        "200":
          description: Webhook processed

  /webhooks/slack:
    post:
      tags: [Webhooks]
      summary: Slack webhook handler
      security: []
      responses:
        "200":
          description: Webhook processed

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (24h expiry). Obtain via /auth/github/callback or /auth/google/callback.

  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    candidateId:
      name: cId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    integrationId:
      name: integrationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Precondition failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadGateway:
      description: Upstream provider error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    AuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          description: Token lifetime in seconds
        is_new:
          type: boolean
          description: Whether this is a newly created user account

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        github_id:
          type: integer
        github_login:
          type: string
        google_id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [starter, pro, enterprise]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrgRole:
      type: string
      enum: [owner, admin, member, viewer]

    OrgMember:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/OrgRole"
        invited_at:
          type: string
          format: date-time
        joined_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
        github_repo:
          type: string
        framework:
          $ref: "#/components/schemas/ProjectFramework"
        styling:
          $ref: "#/components/schemas/ProjectStyling"
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ProjectFramework:
      type: string
      enum: [react, nextjs, vue, svelte, angular]

    ProjectStyling:
      type: string
      enum: [tailwind, css, css_modules, styled_components, emotion]

    Signal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source:
          $ref: "#/components/schemas/SignalSource"
        source_ref:
          type: string
        type:
          $ref: "#/components/schemas/SignalType"
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        ingested_at:
          type: string
          format: date-time

    SignalSource:
      type: string
      enum:
        - gong
        - intercom
        - linear
        - github
        - slack
        - zendesk
        - hubspot
        - amplitude
        - mixpanel
        - csv
        - manual
        - webhook

    SignalType:
      type: string
      enum:
        - call_transcript
        - support_ticket
        - feature_request
        - bug_report
        - user_interview
        - survey_response
        - nps_comment
        - churn_reason
        - product_review
        - slack_message
        - github_issue
        - linear_issue
        - usage_anomaly
        - note
        - event
        - review

    FeatureCandidate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        problem_summary:
          type: string
        status:
          $ref: "#/components/schemas/CandidateStatus"
        score:
          type: number
        signal_count:
          type: integer
        frequency_score:
          type: number
        recency_score:
          type: number
        segment_weight:
          type: number
        churn_risk_score:
          type: number
        cluster_id:
          type: string
          format: uuid
        synthesis_run_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CandidateStatus:
      type: string
      enum: [new, specced, in_progress, reviewing, accepted, rejected, backlogged, shipped]

    Spec:
      type: object
      properties:
        id:
          type: string
          format: uuid
        candidate_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        version:
          type: integer
        problem_statement:
          type: string
        proposed_solution:
          type: string
        user_stories:
          type: array
          items:
            $ref: "#/components/schemas/UserStory"
        acceptance_criteria:
          type: array
          items:
            type: string
        out_of_scope:
          type: array
          items:
            type: string
        ui_changes:
          type: string
        data_model_changes:
          type: string
        open_questions:
          type: array
          items:
            type: string
        generated_by:
          type: string
        created_at:
          type: string
          format: date-time

    UserStory:
      type: object
      properties:
        role:
          type: string
        want:
          type: string
        so_that:
          type: string

    Generation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        spec_id:
          type: string
          format: uuid
        pipeline_run_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        branch_name:
          type: string
        pr_number:
          type: integer
        pr_url:
          type: string
          format: uri
        files:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedFile"
        error_msg:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    GeneratedFile:
      type: object
      properties:
        path:
          type: string
        content:
          type: string

    PipelineRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/PipelineType"
        status:
          type: string
          enum: [pending, running, completed, failed]
        metadata:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string
        created_at:
          type: string
          format: date-time
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/PipelineTask"

    PipelineTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pipeline_run_id:
          type: string
          format: uuid
        river_job_id:
          type: integer
        name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        attempt:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
        error:
          type: string
        sort_order:
          type: integer

    PipelineType:
      type: string
      enum: [ingest, synthesis, spec_gen, codegen, digest, copilot, nango_sync, intercom_sync, slack_sync]

    CopilotNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        target_type:
          $ref: "#/components/schemas/CopilotNoteTargetType"
        target_id:
          type: string
          format: uuid
        note_type:
          type: string
          enum: [review, risk, suggestion, insight]
        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        dismissed:
          type: boolean
        created_at:
          type: string
          format: date-time

    CopilotNoteTargetType:
      type: string
      enum: [candidate, signal_batch, spec, generation, synthesis]

    Integration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        provider:
          type: string
        webhook_secret:
          type: string
