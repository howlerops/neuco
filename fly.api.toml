# Fly.io configuration for neuco-api
app = "neuco-api"
primary_region = "iad"  # Ashburn, VA

[build]
  dockerfile = "Dockerfile"
  target = "server"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # SSE requires long-lived connections
  [http_service.http_options]
    response_header_timeout = 120

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
